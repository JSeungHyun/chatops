spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/chatops
  data:
    redis:
      host: localhost
      password:
  rabbitmq:
    host: localhost
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  minio:
    endpoint: localhost

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web.socket: DEBUG
    org.springframework.messaging: DEBUG
    com.chatops.global.config.WebSocketAuthInterceptor: DEBUG
    com.chatops.global.redis: DEBUG
    com.chatops: DEBUG
